apiVersion: v1
kind: Service
metadata:
  name: {{ include "springboot-chart.fullname" . }}
  labels:
    {{- include "springboot-chart.labels" . | nindent 4 }}
    {{ include "springboot-chart.selectorLabels" . | nindent 4 }}
    {{ include "springboot-chart.customLabels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if contains .Values.service.type "NodePort" -}}
      {{- if not .Values.service.nodePort }}
      {{- fail "ERROR: .Values.service.nodePort is required for .Values.service.type - NodePort" }}
      {{- end }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "springboot-chart.selectorLabels" . | nindent 4 }}

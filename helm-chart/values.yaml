# Default values for springboot-chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.


# This is to override the chart name.
nameOverride: "margin-dre-service"
fullnameOverride: "margin-dre-service"

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
  - name: gateway
    sectionName: http
    # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
  - chart-example.local
  # List of rules and filters applied.
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2



# Additional volumes on the output Deployment definition.
#volumes: []
volumes:
  - name: "tmp"
    mountPath: "/tmp"
    emptyDir: 
      medium: Memory
      sizeLimit: "500Mi"
  - name: cache-volume
    mountPath: "/cache"
    emptyDir:
      sizeLimit: "500Mi"

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

# This is for setting up a deployment configuration
deployment:
  labels:
    APPID: "MAR"
    APPCODE: "12001"
  
  # This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
  replicaCount: 1
  restartPolicy: Never
  ttlSecondsAfterFinished: 100
  
  # This sets the container image 
  # More information can be found here: https://kubernetes.io/docs/concepts/containers/images/
  image:
    repository: "ghcr.io/stacksimplify/kubenginxhelm"
    # This sets the pull policy for images.
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
    # This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
    imagePullSecrets: [ regcred, db-secret, kafka-secret ]
  
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000 
 
  #Pod Resources
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # This is to setup the liveness and readiness probes 
  # more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  livenessProbe:
    httpGet:
      path: /
      port: 5000
      scheme: HTTP
      #port: http
    initialDelaySeconds: 40
    periodSeconds: 25
    timoutSeconds: 10
  readinessProbe:
    httpGet:
      path: /
      port: 5000
      scheme: HTTP
      #port: http
    initialDelaySeconds: 40
    periodSeconds: 25
    timoutSeconds: 10
  
  nodeSelector:
    pillar: risk
    disk: ssd
  tolerations: []
  affinity: {}

# This is for setting up a service configuration
service:
  enabled: true
  type: NodePort
  port: 80
  nodePort: 31239

# App Config
appEnvOverride:
  JAVA_OPTS: "-Xmx19g"
  SPRING_PROFILES_ACTIVE: ""
  spring.profiles.active: ""
  SWAGGER_UI_ENABLED: true

vaultSecrets:
  enabled: true

global:
  app_code: mrgndresvc

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# podSecurityContext:
#   runAsUser: 1000            # All containers run as UID 1000
#   runAsGroup: 3000           # Primary GID for all containers
#   fsGroup: 2000              # Files created on mounted volumes get this GID
#   supplementalGroups: [4000] # Additional groups if needed
#   runAsNonRoot: true         # Prevents root execution

podSecurityContext: {}
containerSecurityContext: {}

autoscaling:
  enabled: true
  # minReplicas: 1
  # maxReplicas: 4




